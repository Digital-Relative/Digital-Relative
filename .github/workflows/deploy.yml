name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Get list of changed functions
          CHANGED=$(git diff HEAD~1 --name-only | grep "supabase/functions/" | grep "index.ts" | sed 's|supabase/functions/||' | sed 's|/index.ts||' | grep -v "^_shared$" | sort -u)
          
          if [ -z "$CHANGED" ]; then
            echo "No edge functions changed"
            exit 0
          fi
          
          echo "Changed functions: $CHANGED"
          
          # Link to Supabase project
          supabase link --project-ref xqmgfyfqeehjvjxbezgx
          
          # Deploy each changed function
          while IFS= read -r func; do
            echo "Deploying: $func"
            if [ "$func" = "stripe-webhook" ]; then
              supabase functions deploy stripe-webhook --no-verify-jwt
            else
              supabase functions deploy "$func"
            fi
          done <<< "$CHANGED"
